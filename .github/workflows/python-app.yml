name: Python CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Python version
        run: python3 --version

      - name: Syntax check
        run: python3 -m py_compile app.py cli_app.py

      - name: Smoke tests
        run: python3 tests/smoke_test.py
