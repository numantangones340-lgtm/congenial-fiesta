name: Build and Release macOS App

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build app bundle
        run: ./build_macos_app.sh

      - name: Package zip
        run: |
          cd dist
          ditto -c -k --sequesterRsrc --keepParent GuitarAmpRecorder.app GuitarAmpRecorder-macOS.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: GuitarAmpRecorder-macOS
          path: dist/GuitarAmpRecorder-macOS.zip

      - name: Publish release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/GuitarAmpRecorder-macOS.zip
