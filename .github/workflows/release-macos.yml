name: Build and Release macOS App

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: [self-hosted, macOS, KOL64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build zip package
        run: |
          python3 -m venv .venv
          source .venv/bin/activate
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
          pyinstaller --windowed --name GuitarAmpRecorder app.py
          cd dist
          zip -r GuitarAmpRecorder-macOS.zip GuitarAmpRecorder.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: GuitarAmpRecorder-macOS
          path: dist/GuitarAmpRecorder-macOS.zip

      - name: Publish release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/GuitarAmpRecorder-macOS.zip
