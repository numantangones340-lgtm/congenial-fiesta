name: Build and Release Desktop Apps

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-release:
    name: Build ${{ matrix.platform.label }}
    runs-on: ${{ matrix.platform.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - label: macOS
            runs_on: macos-14
            artifact_name: GuitarAmpRecorder-macOS
            asset_path: dist/GuitarAmpRecorder-macOS.zip
          - label: Windows
            runs_on: windows-latest
            artifact_name: GuitarAmpRecorder-Windows
            asset_path: dist/GuitarAmpRecorder-Windows.zip
    env:
      APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_APP_CERT_BASE64 }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_APP_CERT_PASSWORD }}
      APPLE_CODESIGN_IDENTITY: ${{ secrets.APPLE_DEVELOPER_ID_APP_IDENTITY }}
      APPLE_ID: ${{ secrets.APPLE_NOTARY_APPLE_ID }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_NOTARY_TEAM_ID }}
      APPLE_APP_PASSWORD: ${{ secrets.APPLE_NOTARY_APP_PASSWORD }}
      KEYCHAIN_PASSWORD: ${{ secrets.APPLE_BUILD_KEYCHAIN_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build macOS app bundle
        if: matrix.platform.label == 'macOS'
        run: ./build_macos_app.sh

      - name: Import Developer ID certificate
        if: matrix.platform.label == 'macOS' && env.APPLE_CERTIFICATE_BASE64 != '' && env.APPLE_CERTIFICATE_PASSWORD != '' && env.APPLE_CODESIGN_IDENTITY != '' && env.KEYCHAIN_PASSWORD != ''
        run: |
          CERT_PATH="$RUNNER_TEMP/developer-id-app.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          echo "$APPLE_CERTIFICATE_BASE64" | base64 --decode > "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db
          security default-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Sign macOS app bundle
        if: matrix.platform.label == 'macOS' && env.APPLE_CODESIGN_IDENTITY != ''
        run: ./sign_macos_app.sh ./dist/GuitarAmpRecorder.app "$APPLE_CODESIGN_IDENTITY"

      - name: Store notarization credentials
        if: matrix.platform.label == 'macOS' && env.APPLE_ID != '' && env.APPLE_TEAM_ID != '' && env.APPLE_APP_PASSWORD != ''
        run: |
          xcrun notarytool store-credentials "AC_PROFILE" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD"

      - name: Notarize and staple app bundle
        if: matrix.platform.label == 'macOS' && env.APPLE_CODESIGN_IDENTITY != '' && env.APPLE_ID != '' && env.APPLE_TEAM_ID != '' && env.APPLE_APP_PASSWORD != ''
        run: ./notarize_macos_app.sh ./dist/GuitarAmpRecorder.app AC_PROFILE "$APPLE_TEAM_ID"

      - name: Package macOS zip
        if: matrix.platform.label == 'macOS'
        run: ./package_macos_release.sh

      - name: Write macOS checksums
        if: matrix.platform.label == 'macOS'
        run: python scripts/write_sha256.py dist/GuitarAmpRecorder-macOS.zip

      - name: Build Windows app
        if: matrix.platform.label == 'Windows'
        shell: pwsh
        run: |
          pyinstaller --noconfirm --clean --windowed --name GuitarAmpRecorder app.py

      - name: Package Windows zip
        if: matrix.platform.label == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path dist/GuitarAmpRecorder/* -DestinationPath dist/GuitarAmpRecorder-Windows.zip -Force

      - name: Write Windows checksums
        if: matrix.platform.label == 'Windows'
        run: python scripts/write_sha256.py dist/GuitarAmpRecorder-Windows.zip

      - name: Generate release notes
        run: python scripts/generate_release_notes.py --output dist/release-notes.md

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform.artifact_name }}
          path: |
            ${{ matrix.platform.asset_path }}
            ${{ matrix.platform.asset_path }}.sha256

      - name: Publish release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ matrix.platform.asset_path }}
            ${{ matrix.platform.asset_path }}.sha256
          body_path: dist/release-notes.md
