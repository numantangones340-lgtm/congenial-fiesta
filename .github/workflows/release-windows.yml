name: Build and Release Windows App

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Windows app
        shell: pwsh
        run: |
          pyinstaller --noconfirm --clean --windowed --name GuitarAmpRecorder app.py

      - name: Package zip
        shell: pwsh
        run: |
          Compress-Archive -Path dist/GuitarAmpRecorder/* -DestinationPath dist/GuitarAmpRecorder-Windows.zip -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: GuitarAmpRecorder-Windows
          path: dist/GuitarAmpRecorder-Windows.zip

      - name: Publish release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/GuitarAmpRecorder-Windows.zip
