<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Guitar Amp Recorder - Indir</title>
  <style>
    :root { --bg:#0f172a; --card:#111827; --text:#e5e7eb; --muted:#9ca3af; --btn:#22c55e; --btn2:#2563eb; }
    * { box-sizing: border-box; }
    body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; background:linear-gradient(135deg,#020617,#111827); color:var(--text); min-height:100vh; display:grid; place-items:center; }
    .card { width:min(720px,92vw); background:rgba(17,24,39,.9); border:1px solid #1f2937; border-radius:16px; padding:28px; }
    h1 { margin:0 0 8px; font-size:32px; }
    p { color:var(--muted); line-height:1.5; }
    .row { display:flex; flex-wrap:wrap; gap:12px; margin:18px 0 10px; }
    a.btn { text-decoration:none; color:white; padding:12px 16px; border-radius:10px; font-weight:600; }
    .primary { background:var(--btn); }
    .secondary { background:var(--btn2); }
    code { background:#0b1220; padding:2px 6px; border-radius:6px; }
  </style>
</head>
<body>
  <main class="card">
    <h1>Guitar Amp Recorder</h1>
    <p>Ses kayit uygulamasini bilgisayariniza indirin. En guncel surume ulasmak icin asagidaki baglantilari kullanin.</p>
    <div class="row">
      <a class="btn primary" href="https://github.com/numantangones340-lgtm/congenial-fiesta/releases/latest">Latest Release</a>
      <a class="btn secondary" href="https://github.com/numantangones340-lgtm/congenial-fiesta">GitHub Repo</a>
    </div>
    <p>MacOS kullanicilari release icinden <code>GuitarAmpRecorder-macOS.zip</code> dosyasini indirebilir.</p>
    <p>Guncel surum: <code>v1.0.1</code></p>
  </main>
</body>
</html>
